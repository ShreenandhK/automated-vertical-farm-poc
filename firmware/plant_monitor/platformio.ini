; ============================================================================
;  PlatformIO Configuration — SIP Plant Monitor ESP32 Firmware
; ============================================================================
;  This file configures PlatformIO to build and upload the firmware.
;
;  USAGE:
;    1. Open this folder in VS Code with the PlatformIO extension.
;    2. Connect your ESP32 via USB.
;    3. Click the "Upload" button (→ arrow) in the PlatformIO toolbar.
;
;  If using Arduino IDE instead, you do NOT need this file.
;  Just open plant_monitor.ino directly.
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor baud rate — must match Serial.begin(115200) in the code.
monitor_speed = 115200

; Library dependencies — PlatformIO fetches these automatically.
; These are the same libraries you'd install manually in Arduino IDE.
lib_deps =
    bblanchon/ArduinoJson@^7.0.0         ; JSON serialization/deserialization
    adafruit/DHT sensor library@^1.4.6    ; DHT22 temperature sensor
    adafruit/Adafruit Unified Sensor@^1.1.14  ; Required dependency for DHT library
    adafruit/Adafruit SSD1306@^2.5.9      ; OLED display driver
    adafruit/Adafruit GFX Library@^1.11.9 ; Graphics primitives for OLED

; Upload speed — increase for faster flashing (default is 460800).
upload_speed = 921600

; Build flags (optional, but helpful):
;   -DCORE_DEBUG_LEVEL=5 enables verbose ESP32 debug logs.
;   Remove or set to 0 for production to reduce noise.
build_flags =
    -DCORE_DEBUG_LEVEL=2
